<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Screen Time 记录器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7effa0;
    --accent2: #3dff77;
    --danger: #ff5f5f;
    --info: #7eb8ff;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page { max-width: 680px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }
  header p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* API Key */
  .key-row { display: flex; gap: 8px; align-items: center; }
  .key-row input {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .key-row input:focus { border-color: var(--accent); }
  .key-status { font-size: 12px; color: var(--accent); margin-top: 6px; display: none; }

  /* Upload zone */
  .upload-zone {
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(126,255,160,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-zone p { font-size: 14px; color: var(--muted); }
  .upload-zone span { font-size: 12px; color: rgba(136,136,136,0.6); margin-top: 4px; display: block; }

  .previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .preview-wrap { position: relative; }
  .preview-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 0.5px solid var(--border2); display: block; }
  .preview-wrap button {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--danger); color: #fff; border: none;
    cursor: pointer; font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }

  /* Buttons */
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg3); }
  .btn-accent {
    background: var(--accent);
    color: #0a1a0e;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-accent:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-danger { color: var(--danger); border-color: rgba(255,95,95,0.3); }
  .btn-danger:hover { background: rgba(255,95,95,0.08); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

  /* Status */
  .status {
    font-size: 13px; padding: 9px 14px;
    border-radius: var(--radius); margin-top: 12px;
    display: none; font-family: var(--mono);
  }
  .status.loading { background: rgba(126,184,255,0.1); color: var(--info); display: block; }
  .status.success { background: rgba(126,255,160,0.1); color: var(--accent); display: block; }
  .status.error { background: rgba(255,95,95,0.1); color: var(--danger); display: block; }

  .result-box {
    background: var(--bg3); border-radius: var(--radius);
    padding: 1rem; font-size: 12px; font-family: var(--mono);
    white-space: pre-wrap; color: var(--muted);
    max-height: 180px; overflow-y: auto;
    margin-top: 12px; display: none;
    border: 0.5px solid var(--border);
  }

  /* History */
  .history-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 1rem;
  }
  .history-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 100px; }
  .history-total { color: var(--text); font-weight: 500; min-width: 70px; }
  .history-apps { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .history-del { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 0 4px; flex-shrink: 0; }
  .history-del:hover { color: var(--danger); }
  .empty { font-size: 13px; color: var(--muted); text-align: center; padding: 2rem 0; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 1rem; }
  .metric { background: var(--bg3); border-radius: var(--radius); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; color: var(--accent); font-family: var(--mono); }

  /* Override date */
  .override-row {
    display: flex; gap: 8px; align-items: center; margin-top: 10px;
  }
  .override-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .override-row input[type=date] {
    background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 6px 10px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    outline: none;
  }
  .override-row input[type=date]:focus { border-color: var(--accent); }
  .batch-note {
    font-size: 12px; color: var(--info);
    background: rgba(126,184,255,0.08);
    border-radius: var(--radius); padding: 6px 12px;
    margin-top: 8px; display: none;
  }

  /* Footer */
  footer { text-align: center; margin-top: 2rem; font-size: 12px; color: rgba(136,136,136,0.4); }

  @media (max-width: 480px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .history-apps { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>Screen Time 记录器</h1>
    <p>上传截图，AI 自动识别日期与数据，长期追踪手机使用习惯</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <p class="card-title">Anthropic API Key</p>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey()" />
      <button class="btn" onclick="toggleKey()">显示</button>
    </div>
    <p class="key-status" id="keyStatus">✓ 已保存</p>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;">Key 只存在你的浏览器本地，不会上传到任何服务器</p>
  </div>

  <!-- Upload -->
  <div class="card">
    <p class="card-title">上传截图</p>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="imgInput" accept="image/*" multiple onchange="handleFiles(this.files)" />
      <div class="upload-icon">↑</div>
      <p>点击或拖拽上传 Screen Time 截图</p>
      <span>支持多天批量上传 · 建议每天截：总览 + App 详情 + 时段图</span>
    </div>
    <div class="previews" id="previews"></div>
    <div class="batch-note" id="batchNote"></div>
    <div class="override-row">
      <label>手动指定日期（AI 无法识别时使用）</label>
      <input type="date" id="dateOverride" />
      <button class="btn" style="padding:5px 10px;font-size:12px;" onclick="document.getElementById('dateOverride').value=''">清除</button>
    </div>
    <div id="status" class="status"></div>
    <div id="resultBox" class="result-box"></div>
    <div class="btn-row">
      <button class="btn btn-accent" id="analyzeBtn" onclick="analyze()" disabled>AI 分析并保存</button>
      <button class="btn" onclick="clearImages()">清除截图</button>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="history-header">
      <p class="card-title" style="margin:0">历史记录</p>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="exportCSV()" style="padding:6px 14px;font-size:12px;">导出 CSV</button>
        <button class="btn btn-danger" onclick="clearAll()" style="padding:6px 14px;font-size:12px;">清除全部</button>
      </div>
    </div>
    <div id="historyList"></div>
    <div class="metrics" id="metrics" style="display:none"></div>
  </div>

  <!-- Charts -->
  <div id="chartsSection" style="display:none">

    <div class="card">
      <p class="card-title">每日总使用时间</p>
      <canvas id="chartTotal" height="180"></canvas>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <p class="card-title" style="margin:0">各 App 每日用时</p>
        <div id="appLegend" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
      </div>
      <canvas id="chartApps" height="200"></canvas>
    </div>

    <div class="card">
      <p class="card-title">各时段平均使用时间（分钟）</p>
      <canvas id="chartHourly" height="200"></canvas>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted);">
        <span><span style="display:inline-block;width:10px;height:10px;background:#ff5f5f;border-radius:2px;margin-right:4px;"></span>睡前 22–4点</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#ffb87e;border-radius:2px;margin-right:4px;"></span>早起 5–10点</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#7effa0;border-radius:2px;margin-right:4px;"></span>其他时段</span>
      </div>
    </div>

  </div>

  <footer>数据存储在浏览器 localStorage · 换设备或清除浏览器数据会丢失，建议定期导出 CSV</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let images = [];
let history = [];
let chartTotal = null, chartApps = null, chartHourly = null;
const APP_COLORS = [
  '#7effa0','#7eb8ff','#ffb87e','#ff7eb8','#b87eff',
  '#ff7e7e','#7effee','#ffe07e','#c8ff7e','#ff9f7e'
];

// Init
(function init() {
  const saved = localStorage.getItem('st_apikey');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keyStatus').style.display = 'block';
  }
  const h = localStorage.getItem('st_history');
  if (h) { try { history = JSON.parse(h); } catch(e) {} }
  renderHistory();
  renderCharts();
  setupDrop();
})();

function saveKey() {
  const v = document.getElementById('apiKey').value.trim();
  if (v) { localStorage.setItem('st_apikey', v); document.getElementById('keyStatus').style.display = 'block'; }
  else { localStorage.removeItem('st_apikey'); document.getElementById('keyStatus').style.display = 'none'; }
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function setupDrop() {
  const zone = document.getElementById('dropZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    handleFiles(e.dataTransfer.files);
  });
}

function handleFiles(files) {
  for (const f of files) {
    const reader = new FileReader();
    reader.onload = e => {
      images.push({ name: f.name, data: e.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(f);
  }
}

function renderPreviews() {
  const c = document.getElementById('previews');
  c.innerHTML = images.map((img, i) =>
    `<div class="preview-wrap">
      <img src="${img.data}" alt="" />
      <button onclick="removeImg(${i})">×</button>
    </div>`
  ).join('');
  document.getElementById('analyzeBtn').disabled = images.length === 0;
  const note = document.getElementById('batchNote');
  if (images.length > 3) {
    note.style.display = 'block';
    note.textContent = `已选 ${images.length} 张截图，AI 会自动识别每张日期并分组`;
  } else { note.style.display = 'none'; }
}

function removeImg(i) { images.splice(i, 1); renderPreviews(); }

function clearImages() {
  images = [];
  renderPreviews();
  document.getElementById('resultBox').style.display = 'none';
  setStatus('');
  document.getElementById('batchNote').style.display = 'none';
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function analyze() {
  const apiKey = localStorage.getItem('st_apikey');
  if (!apiKey) { setStatus('请先填写 API Key', 'error'); return; }
  if (images.length === 0) { setStatus('请先上传截图', 'error'); return; }

  const override = document.getElementById('dateOverride').value;
  setStatus('AI 正在分析截图...', 'loading');
  document.getElementById('analyzeBtn').disabled = true;

  const dateNote = override
    ? `截图日期请使用 ${override}。`
    : `请从截图里识别日期。Screen Time 可能显示"今天""昨天"或具体日期，今天实际是 ${todayStr()}，请据此推算。如无法识别请填 "${todayStr()}"。`;

  const content = [
    {
      type: 'text',
      text: `分析这些 iPhone Screen Time 截图。${dateNote}

若截图来自多天，按日期分组，每组一个对象。只返回 JSON 数组，不要其他文字：

[
  {
    "date": "YYYY-MM-DD",
    "total_minutes": 数字,
    "pickups": 数字或null,
    "notifications": 数字或null,
    "apps": [{"name": "App名", "minutes": 数字}],
    "hourly": [{"hour": 0到23的整数, "minutes": 数字}],
    "night_usage": "22点后使用描述或null",
    "morning_usage": "7点前使用描述或null",
    "notes": "其他观察"
  }
]`
    },
    ...images.map(img => ({
      type: 'image',
      source: {
        type: 'base64',
        media_type: img.data.match(/^data:([^;]+);/)?.[1] || 'image/png',
        data: img.data.split(',')[1]
      }
    }))
  ];

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8192,
        messages: [{ role: 'user', content }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const raw = data.content.map(b => b.text || '').join('');

    // Try multiple strategies to extract JSON
    let parsed;
    const attempts = [
      () => JSON.parse(raw.trim()),
      () => JSON.parse(raw.replace(/```json|```/gi, '').trim()),
      () => { const m = raw.match(/\[[\s\S]*\]/); if (m) return JSON.parse(m[0]); throw new Error(); },
      () => { const m = raw.match(/\{[\s\S]*\}/); if (m) return JSON.parse('[' + m[0] + ']'); throw new Error(); },
    ];
    for (const attempt of attempts) {
      try { parsed = attempt(); break; } catch(e) {}
    }
    if (!parsed) {
      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('resultBox').textContent = raw;
      setStatus('AI 返回格式有误，请查看原始结果', 'error');
      document.getElementById('analyzeBtn').disabled = false;
      return;
    }

    const entries = Array.isArray(parsed) ? parsed : [parsed];
    const savedDates = [];
    for (const entry of entries) {
      if (!entry.date) continue;
      const idx = history.findIndex(h => h.date === entry.date);
      if (idx >= 0) history[idx] = entry; else history.push(entry);
      savedDates.push(entry.date);
    }
    history.sort((a, b) => b.date.localeCompare(a.date));
    localStorage.setItem('st_history', JSON.stringify(history));

    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('resultBox').textContent = JSON.stringify(entries, null, 2);
    setStatus(savedDates.length > 1 ? `已保存 ${savedDates.length} 天：${savedDates.join('、')}` : `已保存 ${savedDates[0]}`, 'success');
    renderHistory();
    renderCharts();
    images = [];
    renderPreviews();
  } catch(e) {
    setStatus('分析失败：' + e.message, 'error');
  }
  document.getElementById('analyzeBtn').disabled = false;
}

function fmtMins(m) {
  if (m == null || m === '') return '—';
  m = parseInt(m);
  if (isNaN(m)) return '—';
  if (m < 60) return m + 'min';
  return Math.floor(m/60) + 'h ' + (m%60) + 'm';
}

function renderHistory() {
  const c = document.getElementById('historyList');
  if (!history.length) {
    c.innerHTML = '<div class="empty">暂无记录，上传截图开始</div>';
    document.getElementById('metrics').style.display = 'none';
    return;
  }
  c.innerHTML = history.map((h, i) => {
    const apps = (h.apps||[]).slice(0,3).map(a=>a.name).join('、');
    return `<div class="history-row">
      <span class="history-date">${h.date}</span>
      <span class="history-total">${fmtMins(h.total_minutes)}</span>
      <span class="history-apps">${apps || h.notes || '—'}</span>
      <button class="history-del" onclick="delEntry(${i})">×</button>
    </div>`;
  }).join('');

  const vals = history.map(h=>h.total_minutes||0).filter(v=>v>0);
  const avg = vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) : 0;
  const mx = vals.length ? Math.max(...vals) : 0;
  const m = document.getElementById('metrics');
  m.style.display = 'grid';
  m.innerHTML = `
    <div class="metric"><div class="metric-label">已记录</div><div class="metric-value">${history.length}天</div></div>
    <div class="metric"><div class="metric-label">日均使用</div><div class="metric-value">${fmtMins(avg)}</div></div>
    <div class="metric"><div class="metric-label">最长一天</div><div class="metric-value">${fmtMins(mx)}</div></div>
  `;
}

function delEntry(i) {
  history.splice(i, 1);
  localStorage.setItem('st_history', JSON.stringify(history));
  renderHistory();
  renderCharts();
}

function exportCSV() {
  if (!history.length) { alert('暂无数据'); return; }
  const allApps = [...new Set(history.flatMap(h=>(h.apps||[]).map(a=>a.name)))];
  const hours = Array.from({length:24},(_,i)=>i);
  const headers = ['日期','总使用(分钟)','拾起次数','通知数量','临睡前(22-4点)','早起(5-10点)','备注',
    ...allApps.map(a=>`[App]${a}`), ...hours.map(h=>`[时段]${h}点`)];
  const rows = history.map(h => {
    const am = Object.fromEntries((h.apps||[]).map(a=>[a.name,a.minutes]));
    const hm = Object.fromEntries((h.hourly||[]).map(x=>[x.hour,x.minutes]));
    return [h.date, h.total_minutes??'', h.pickups??'', h.notifications??'',
      h.night_usage??'', h.morning_usage??'', h.notes??'',
      ...allApps.map(a=>am[a]??''), ...hours.map(hr=>hm[hr]??'')];
  });
  const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `screen_time_${todayStr()}.csv`;
  a.click();
}

async function clearAll() {
  if (!confirm('确定清除所有历史数据？')) return;
  history = [];
  localStorage.setItem('st_history', JSON.stringify(history));
  renderHistory();
  renderCharts();
}

// ── Charts ──────────────────────────────────────────────

function renderCharts() {
  if (!history.length) { document.getElementById('chartsSection').style.display = 'none'; return; }
  document.getElementById('chartsSection').style.display = 'block';

  const sorted = [...history].sort((a,b) => a.date.localeCompare(b.date));
  const labels = sorted.map(h => h.date.slice(5)); // MM-DD

  // Chart defaults
  Chart.defaults.color = '#888';
  Chart.defaults.font.family = "'DM Mono', monospace";
  Chart.defaults.font.size = 11;

  // 1. Daily total
  const totalData = sorted.map(h => Math.round((h.total_minutes||0)));
  if (chartTotal) chartTotal.destroy();
  chartTotal = new Chart(document.getElementById('chartTotal'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: totalData,
        backgroundColor: totalData.map(v => {
          const avg = totalData.reduce((s,x)=>s+x,0)/totalData.length;
          return v > avg * 1.2 ? 'rgba(255,95,95,0.7)' : 'rgba(126,255,160,0.7)';
        }),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => fmtMins(ctx.raw) }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { maxRotation: 45 } },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { callback: v => fmtMins(v) }
        }
      }
    }
  });

  // 2. App breakdown (stacked bar, top 6 apps)
  const allApps = [...new Set(sorted.flatMap(h=>(h.apps||[]).map(a=>a.name)))];
  // rank by total minutes across all days
  const appTotals = allApps.map(name => ({
    name,
    total: sorted.reduce((s,h)=>{
      const a = (h.apps||[]).find(x=>x.name===name);
      return s + (a ? a.minutes : 0);
    }, 0)
  })).sort((a,b)=>b.total-a.total);
  const topApps = appTotals.slice(0,6).map(a=>a.name);

  const appDatasets = topApps.map((name, ci) => ({
    label: name,
    data: sorted.map(h => {
      const a = (h.apps||[]).find(x=>x.name===name);
      return a ? Math.round(a.minutes) : 0;
    }),
    backgroundColor: APP_COLORS[ci % APP_COLORS.length] + 'cc',
    borderRadius: 2,
    borderSkipped: false,
  }));

  if (chartApps) chartApps.destroy();
  chartApps = new Chart(document.getElementById('chartApps'), {
    type: 'bar',
    data: { labels, datasets: appDatasets },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtMins(ctx.raw)}` }
        }
      },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { maxRotation: 45 } },
        y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => fmtMins(v) } }
      }
    }
  });

  // legend
  const legend = document.getElementById('appLegend');
  legend.innerHTML = topApps.map((name,i) =>
    `<span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;">
      <span style="width:8px;height:8px;border-radius:2px;background:${APP_COLORS[i%APP_COLORS.length]};flex-shrink:0;"></span>${name}
    </span>`
  ).join('');

  // 3. Hourly average
  const hourAvg = Array.from({length:24}, (_, hr) => {
    const vals = sorted.map(h => {
      const found = (h.hourly||[]).find(x=>x.hour===hr);
      return found ? found.minutes : null;
    }).filter(v=>v!==null);
    return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) : 0;
  });

  const hourColors = hourAvg.map((_, i) => {
    if (i >= 22 || i <= 4) return 'rgba(255,95,95,0.75)';
    if (i >= 5 && i <= 10) return 'rgba(255,184,126,0.75)';
    return 'rgba(126,255,160,0.55)';
  });

  if (chartHourly) chartHourly.destroy();
  chartHourly = new Chart(document.getElementById('chartHourly'), {
    type: 'bar',
    data: {
      labels: Array.from({length:24},(_,i)=>`${i}点`),
      datasets: [{
        data: hourAvg,
        backgroundColor: hourColors,
        borderRadius: 3,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `平均 ${ctx.raw} 分钟` } }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => v+'m' } }
      }
    }
  });
}

</script>
</body>
</html>
